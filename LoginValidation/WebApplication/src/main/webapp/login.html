<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login</title>
    <style>
        /* Modern Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Container Design */
        #signinform {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-bottom: 24px;
            color: #333;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* Form Labels & Inputs */
        .input-group {
            margin-bottom: 15px;
            color: #555;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin-top: 6px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }

        /* Button Styling */
        input[type="submit"] {
            background-color: #764ba2;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            background-color: #5a3a7e;
        }

        /* Footer Section */
        h3 {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #777;
            text-align: center;
            font-weight: 400;
        }

        a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            display: block;
            margin-top: 5px;
            transition: color 0.2s;
        }

        a:hover {
            color: #667eea;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <form action="login" method="post" id="signinform">

        <h2>Welcome Back</h2>

        <div class="input-group">
            Username
            <input type="text" name="username" id="un" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
            Password
            <input type="password" name="password" id="pass" placeholder="••••••••" required>
        </div>

        <input type="submit" value="Login">

        <div class="form-footer">
            <h3>New User?</h3>
            <a href="signup.html">Create an account</a>
        </div>

    </form>

</body>

</html>
